<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow — Finance Dashboard</title>

  <!-- Google Fonts: DM Sans for UI text, DM Mono for numbers/code -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!--
    Stylesheets loaded in this exact order:
      1. tokens.css   → CSS custom properties (colors, spacing, fonts)
      2. base.css     → Reset + global element styles
      3. layout.css   → Shell, sidebar, topbar, main area
      4. components.css → Reusable UI pieces (cards, badges, modal, toast)
      5. pages.css    → Page-specific styles (overview, transactions, insights)
  -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════════
       APP SHELL
  ════════════════════════════════════════════════ -->
  <div class="shell">

    <!-- ── Sidebar Navigation ── -->
    <nav class="sidebar" id="sidebar">

      <div class="sidebar-brand">
        <div class="brand-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">FinFlow</div>
          <div class="brand-version">v1.0.0</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Menu</div>

        <!-- data-page is read by goPage() in ui.js -->
        <div class="nav-link active" data-page="overview" onclick="goPage('overview')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          Overview
        </div>

        <div class="nav-link" data-page="transactions" onclick="goPage('transactions')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          Transactions
        </div>

        <div class="nav-link" data-page="insights" onclick="goPage('insights')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Insights
        </div>
      </div>

      <!-- Role switcher — pinned to sidebar bottom -->
      <div class="sidebar-role">
        <div class="role-label-txt">Role</div>
        <div class="role-switch">
          <button class="role-opt" id="ro-viewer" onclick="setRole('viewer')">Viewer</button>
          <button class="role-opt active" id="ro-admin"  onclick="setRole('admin')">Admin</button>
        </div>
        <!-- Icon + label injected dynamically by setRole() in ui.js -->
        <div id="role-pill" class="role-pill admin">
          <span id="role-pill-txt">Admin</span>
        </div>
      </div>
    </nav>

    <!-- Mobile backdrop — tapping closes sidebar -->
    <div class="mob-overlay" id="mobOverlay" onclick="closeSidebar()"></div>

    <!-- ── Main Column ── -->
    <div class="main">

      <header class="topbar">
        <div class="topbar-left">
          <!-- Only visible on mobile -->
          <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <!-- Updated by goPage() in ui.js -->
          <div class="page-title" id="pageTitle">Dashboard Overview</div>
        </div>

        <div class="topbar-right">
          <div class="topbar-date" id="todayDate"></div>
          <button class="export-btn" onclick="exportCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Export CSV
          </button>
          <button class="theme-btn" onclick="toggleTheme()">
            <!-- Icon swapped by toggleTheme() in ui.js -->
            <svg id="themeIco" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- render() in pages.js writes HTML into this element -->
      <main id="pageContent" class="page"></main>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       ADD / EDIT TRANSACTION MODAL
       (hidden by default; shown by openAdd/openEdit in ui.js)
  ════════════════════════════════════════════════ -->
  <div id="modal" class="modal-backdrop" style="display:none"
    onclick="if(event.target === this) closeModal()">
    <div class="modal-box">

      <div class="modal-head">
        <div class="modal-title" id="modalTitle">Add Transaction</div>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="form-grid2">
        <div class="fgroup">
          <label class="flabel">Date</label>
          <input class="finput" type="date" id="fd" />
          <div class="ferror" id="fe-d"></div>
        </div>
        <div class="fgroup">
          <label class="flabel">Amount ($)</label>
          <input class="finput" type="number" min="0.01" step="0.01"
            placeholder="0.00" id="fa" />
          <div class="ferror" id="fe-a"></div>
        </div>
        <div class="fgroup">
          <label class="flabel">Category</label>
          <select class="fselect" id="fc">
            <option>Food</option>
            <option>Travel</option>
            <option>Bills</option>
            <option>Shopping</option>
            <option>Salary</option>
            <option>Freelance</option>
            <option>Other</option>
          </select>
        </div>
        <div class="fgroup">
          <label class="flabel">Type</label>
          <select class="fselect" id="ft">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="fgroup fg-full">
          <label class="flabel">
            Note <span style="font-weight:400; color:var(--text3)">(optional)</span>
          </label>
          <input class="finput" placeholder="Short description…" id="fn" />
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-solid" onclick="submitForm()" id="fSubmit">
          Add Transaction
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notifications stack here (bottom-right) -->
  <div class="toast-wrap" id="toastWrap"></div>

  <!-- ════════════════════════════════════════════════
       SCRIPTS — order is critical:
         data.js   → seed transactions, category colours
         state.js  → single S{} state object + localStorage
         utils.js  → formatters, icon builder, esc()
         charts.js → SVG chart renderers (uses utils)
         pages.js  → HTML builders for each page (uses charts + utils)
         ui.js     → event handlers, modal, toast, sidebar, role, theme
         app.js    → bootstraps the whole app (runs last)
  ════════════════════════════════════════════════ -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
